name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Run linting
        run: npm run lint

      - name: Check code formatting
        run: npm run prettier -- --check

  auto-merge:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'renovate[bot]' && github.event_name == 'pull_request' }}

    steps:
      - name: Enable auto-merge for Renovate PRs
        if: ${{ contains(github.event.pull_request.title, 'chore(deps)') || contains(github.event.pull_request.title, 'fix(deps)') }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
